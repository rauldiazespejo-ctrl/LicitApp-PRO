apiVersion: v1
kind: Secret
metadata:
  name: licitapp-secrets
  namespace: licitapp
  labels:
    app.kubernetes.io/part-of: licitapp
type: Opaque
# IMPORTANT: Replace these base64 values with actual secrets
# Generate with: echo -n "your_secret" | base64
stringData:
  POSTGRES_USER: licitapp_user
  POSTGRES_PASSWORD: CHANGE_ME_STRONG_PASSWORD
  POSTGRES_DB: licitapp_chile
  REDIS_PASSWORD: CHANGE_ME_REDIS_PASSWORD
  ELASTICSEARCH_PASSWORD: CHANGE_ME_ES_PASSWORD
  JWT_SECRET: CHANGE_ME_256BIT_RANDOM_SECRET
  ENCRYPTION_KEY: CHANGE_ME_32_BYTE_AES_KEY_BASE64
  GRAFANA_ADMIN_PASSWORD: CHANGE_ME_GRAFANA_PASSWORD
  # Portal credentials
  CHILECOMPRA_TICKET: ""
  WHEREX_API_KEY: ""
  SAP_ARIBA_CLIENT_ID: ""
  SAP_ARIBA_CLIENT_SECRET: ""
  SAP_ARIBA_REALM: ""
  COUPA_CLIENT_ID: ""
  COUPA_CLIENT_SECRET: ""
  COUPA_INSTANCE_URL: ""
  SICEP_API_KEY: ""
  PORTAL_MINERO_USER: ""
  PORTAL_MINERO_PASSWORD: ""
  # Email
  SMTP_HOST: smtp.sendgrid.net
  SMTP_PORT: "587"
  SMTP_USER: apikey
  SMTP_PASSWORD: CHANGE_ME_SENDGRID_API_KEY
  SMTP_FROM: noreply@licitapp.cl
