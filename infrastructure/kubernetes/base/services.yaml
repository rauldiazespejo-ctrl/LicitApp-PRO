apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectors
  namespace: licitapp
  labels:
    app: connectors
    app.kubernetes.io/part-of: licitapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connectors
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: connectors
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: connectors
          image: licitapp/connectors:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: licitapp-config
            - secretRef:
                name: licitapp-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 40
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: connectors-service
  namespace: licitapp
spec:
  selector:
    app: connectors
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
