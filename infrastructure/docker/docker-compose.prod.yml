x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

services:
  postgres:
    image: postgres:16-alpine
    container_name: licitapp_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: licitapp_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --tls-port 0
      --loglevel warning
      --save 900 1
      --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: licitapp_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=licitapp-cluster
      - node.name=es-node-01
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTICSEARCH_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  api-gateway:
    image: licitapp/api-gateway:${APP_VERSION:-latest}
    build:
      context: ./../../
      dockerfile: ./infrastructure/docker/Dockerfile.api-gateway
      target: production
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSL: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 1h
      JWT_REFRESH_EXPIRY: 7d
      CONNECTORS_SERVICE_URL: http://connectors:3001
      SEARCH_SERVICE_URL: http://search:3002
      NOTIFICATIONS_SERVICE_URL: http://notifications:3003
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: warn
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100m
      - /app/logs:size=200m
    networks:
      - backend
      - frontend

  connectors:
    image: licitapp/connectors:${APP_VERSION:-latest}
    build:
      context: ./../../
      dockerfile: ./infrastructure/docker/Dockerfile.connectors
      target: production
    container_name: licitapp_connectors
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CHILECOMPRA_TICKET: ${CHILECOMPRA_TICKET}
      WHEREX_API_KEY: ${WHEREX_API_KEY}
      WHEREX_API_URL: ${WHEREX_API_URL:-https://api.wherex.cl/v1}
      SAP_ARIBA_CLIENT_ID: ${SAP_ARIBA_CLIENT_ID}
      SAP_ARIBA_CLIENT_SECRET: ${SAP_ARIBA_CLIENT_SECRET}
      SAP_ARIBA_REALM: ${SAP_ARIBA_REALM}
      COUPA_INSTANCE_URL: ${COUPA_INSTANCE_URL}
      COUPA_CLIENT_ID: ${COUPA_CLIENT_ID}
      COUPA_CLIENT_SECRET: ${COUPA_CLIENT_SECRET}
      SICEP_API_KEY: ${SICEP_API_KEY}
      PORTAL_MINERO_USER: ${PORTAL_MINERO_USER}
      PORTAL_MINERO_PASSWORD: ${PORTAL_MINERO_PASSWORD}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: warn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  search:
    image: licitapp/search:${APP_VERSION:-latest}
    build:
      context: ./../../
      dockerfile: ./infrastructure/docker/Dockerfile.search
      target: production
    container_name: licitapp_search
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      NODE_ENV: production
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_TTL: 300
      LOG_LEVEL: warn
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  notifications:
    image: licitapp/notifications:${APP_VERSION:-latest}
    build:
      context: ./../../
      dockerfile: ./infrastructure/docker/Dockerfile.notifications
      target: production
    container_name: licitapp_notifications
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@licitapp.cl}
      LOG_LEVEL: warn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  frontend:
    image: licitapp/frontend:${APP_VERSION:-latest}
    build:
      context: ./../../frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_APP_VERSION: ${APP_VERSION:-latest}
    container_name: licitapp_frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

  nginx:
    image: nginx:1.25-alpine
    container_name: licitapp_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./../nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./../nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - api-gateway
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - backend

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: licitapp_prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always
    logging: *default-logging
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.2
    container_name: licitapp_grafana
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN:-localhost}/grafana
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_LOG_LEVEL: warn
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: always
    logging: *default-logging
    networks:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  frontend:
    name: licitapp_frontend
    driver: bridge
  backend:
    name: licitapp_backend
    driver: bridge
    internal: true
  monitoring:
    name: licitapp_monitoring
    driver: bridge
    internal: true
