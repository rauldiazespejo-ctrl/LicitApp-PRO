[build]
builder = "dockerfile"

[[services]]
name = "api-gateway"
dockerfilePath = "infrastructure/docker/Dockerfile.api-gateway"
buildContext = "."
startCommand = "node --require /app/node_modules/ts-node/register/transpile-only services/api-gateway/src/index.ts"

